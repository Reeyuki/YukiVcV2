        const getBaseUrl = () => {
            const loc = window.location;
            const revcIndex = loc.pathname.indexOf('/revc');
            if (revcIndex !== -1) {
                return loc.origin + loc.pathname.substring(0, revcIndex) + '/revc/';
            }
            return 'https://cdn.jsdelivr.net/gh/reeyuki/YukiVcV2@main/revc/';
        };
        window.BASE_URL = getBaseUrl();
        
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = window.BASE_URL + 'style.css';
        document.head.appendChild(link);
    </script>

<script>
const loadingText = document.querySelector("#loading-text");
let loadedBytes = 0;
const DB_NAME = "gameFilesDB";
const STORE_NAME = "files";

// Open or create IndexedDB
function openDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME);
            }
        };
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e.target.error);
    });
}

// Save file to IndexedDB
async function saveFile(name, buffer) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);
        store.put(buffer, name);
        tx.oncomplete = () => resolve();
        tx.onerror = e => reject(e.target.error);
    });
}

// Get file from IndexedDB
async function getFile(name) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(name);
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e.target.error);
    });
}

// Fetch with progress and caching
async function fetchWithCache(name, url) {
    let cached = await getFile(name);
    if (cached) return cached; // Return cached version

    const response = await fetch(window.BASE_URL + "assets/" + url);
    const reader = response.body.getReader();
    let chunks = [];
    let received = 0;

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        received += value.length;
        loadedBytes += value.length;
        chunks.push(value);

        let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
        let mbTotal = '633.45';
        loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
    }

    let fullBuffer = new Uint8Array(received);
    let offset = 0;
    for (let chunk of chunks) {
        fullBuffer.set(chunk, offset);
        offset += chunk.length;
    }

    await saveFile(name, fullBuffer.buffer); // Cache it
    return fullBuffer.buffer;
}

// Merge multiple parts
async function mergeFiles(fileParts, namePrefix) {
    const buffers = [];
    for (let i = 0; i < fileParts.length; i++) {
        const buffer = await fetchWithCache(`${namePrefix}.part${i+1}`, fileParts[i]);
        buffers.push(buffer);
    }
    const mergedBlob = new Blob(buffers);
    return URL.createObjectURL(mergedBlob);
}

// Generate part URLs
function getParts(file, start, end) {
    let parts = [];
    for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
    }
    return parts;
}

// Start fetching and caching
Promise.all([
    mergeFiles(getParts("index.data", 1, 7), "index.data"),
    mergeFiles(getParts("audio/emotion.adf", 1, 3), "emotion.adf"),
    mergeFiles(getParts("audio/espant.adf", 1, 3), "espant.adf"),
    mergeFiles(getParts("audio/fever.adf", 1, 3), "fever.adf"),
    mergeFiles(getParts("audio/flash.adf", 1, 3), "flash.adf"),
    mergeFiles(getParts("audio/kchat.adf", 1, 3), "kchat.adf"),
    mergeFiles(getParts("audio/vcpr.adf", 1, 2), "vcpr.adf"),
    mergeFiles(getParts("audio/vrock.adf", 1, 4), "vrock.adf"),
    mergeFiles(getParts("audio/wave.adf", 1, 4), "wave.adf"),
    mergeFiles(getParts("audio/wild.adf", 1, 4), "wild.adf"),
]).then(([indexdataurl, EMOTIONadfurl, ESPANTadfurl, FEVERadfurl, FLASHadfurl, KCHATadfurl, VCPRadfurl, VROCKadfurl, WAVEadfurl, WILDadfurl]) => {
    
    // Override fetch to use cached URLs
    const originalFetch = window.fetch;
    window.fetch = async function(input, init) {
        let urlString = input instanceof Request ? input.url : String(input);
        let rewrittenUrl = urlString;

        if (urlString.startsWith('/assets/')) {
            rewrittenUrl = window.BASE_URL + urlString.substring(1);
        } else if (urlString.startsWith('assets/')) {
            rewrittenUrl = window.BASE_URL + urlString;
        } else {
            const originAssets = window.location.origin + '/assets/';
            if (urlString.startsWith(originAssets)) {
                rewrittenUrl = window.BASE_URL + 'assets/' + urlString.substring(originAssets.length);
            }
        }

        let finalUrl = rewrittenUrl;
        const lowerUrl = rewrittenUrl.toLowerCase();
        if (lowerUrl.includes("index.data".toLowerCase())) finalUrl = indexdataurl;
        else if (lowerUrl.includes("emotion.adf".toLowerCase())) finalUrl = EMOTIONadfurl;
        else if (lowerUrl.includes("espant.adf".toLowerCase())) finalUrl = ESPANTadfurl;
        else if (lowerUrl.includes("fever.adf".toLowerCase())) finalUrl = FEVERadfurl;
        else if (lowerUrl.includes("flash.adf".toLowerCase())) finalUrl = FLASHadfurl;
        else if (lowerUrl.includes("kchat.adf".toLowerCase())) finalUrl = KCHATadfurl;
        else if (lowerUrl.includes("VCPR.adf".toLowerCase())) finalUrl = VCPRadfurl;
        else if (lowerUrl.includes("VROCK.adf".toLowerCase())) finalUrl = VROCKadfurl;
        else if (lowerUrl.includes("WAVE.adf".toLowerCase())) finalUrl = WAVEadfurl;
        else if (lowerUrl.includes("WILD.adf".toLowerCase())) finalUrl = WILDadfurl;

        if (input instanceof Request && finalUrl === urlString) {
            return originalFetch(input, init);
        }

        return originalFetch(finalUrl.toLowerCase(), init);
    };

    // Similarly override XHR
    const originalOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        let urlString = String(url);
        if (urlString.includes("https://cdn.dos.zone/vcsky/fetched/".toLowerCase())) {
            urlString = urlString.replace("https://cdn.dos.zone/vcsky/fetched/", "");
        }

        if (urlString.startsWith('/assets/')) {
            urlString = window.BASE_URL + urlString.substring(1);
        } else if (urlString.startsWith('assets/')) {
            urlString = window.BASE_URL + urlString;
        } else {
            const originAssets = window.location.origin + '/assets/';
            if (urlString.startsWith(originAssets)) {
                urlString = window.BASE_URL + 'assets/' + urlString.substring(originAssets.length);
            }
        }

        const lowerUrl = urlString.toLowerCase();
        let finalUrl = urlString;
        if (lowerUrl.includes("index.data".toLowerCase())) finalUrl = indexdataurl;
        else if (lowerUrl.includes("emotion.adf".toLowerCase())) finalUrl = EMOTIONadfurl;
        else if (lowerUrl.includes("espant.adf".toLowerCase())) finalUrl = ESPANTadfurl;
        else if (lowerUrl.includes("fever.adf".toLowerCase())) finalUrl = FEVERadfurl;
        else if (lowerUrl.includes("flash.adf".toLowerCase())) finalUrl = FLASHadfurl;
        else if (lowerUrl.includes("KCHAT.adf".toLowerCase())) finalUrl = KCHATadfurl;
        else if (lowerUrl.includes("VCPR.adf".toLowerCase())) finalUrl = VCPRadfurl;
        else if (lowerUrl.includes("VROCK.adf".toLowerCase())) finalUrl = VROCKadfurl;
        else if (lowerUrl.includes("WAVE.adf".toLowerCase())) finalUrl = WAVEadfurl;
        else if (lowerUrl.includes("WILD.adf".toLowerCase())) finalUrl = WILDadfurl;
        
        return originalOpen.call(this, method, finalUrl.toLowerCase(), ...rest);
    };

    // Load game scripts
    ["gamepademulator.js", "idbfs.js", "game.js"].forEach(src => {
        const script = document.createElement("script");
        script.src = window.BASE_URL + src;
        document.body.appendChild(script);
    });

    loadingText.remove();
});
</script>
